<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超级工作个体</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-2xl mx-auto px-4 py-8">

        <!-- 标题 -->
        <h1 class="text-2xl font-bold text-gray-800 mb-6">事项记录</h1>

        <!-- 输入区 -->
        <div class="bg-white rounded-lg shadow-sm border p-4 mb-6">
            <form id="add-form" class="flex gap-2">
                <input
                    id="task-input"
                    type="text"
                    placeholder="输入你想做的事...（加「本周」表示本周完成）"
                    class="flex-1 px-3 py-2 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
                    autofocus
                >
                <select id="task-deadline" class="px-3 py-2 border rounded-lg text-sm bg-white">
                    <option value="today">今日</option>
                    <option value="week">本周</option>
                </select>
                <button type="submit" class="px-4 py-2 bg-blue-500 text-white rounded-lg text-sm font-medium hover:bg-blue-600">
                    添加
                </button>
            </form>
        </div>

        <!-- 今日待办 -->
        <div class="mb-6">
            <h2 class="text-sm font-semibold text-red-500 mb-2">今日必须完成</h2>
            <div id="today-list" class="space-y-1">
                {% for task in today_tasks %}
                <div class="bg-white rounded border px-4 py-3 flex items-center justify-between group hover:shadow-sm transition-shadow" id="task-{{ task.id }}">
                    <span class="text-sm text-gray-700">{{ task.content }}</span>
                    <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="doneTask({{ task.id }})" class="text-xs px-2 py-1 bg-green-50 text-green-600 rounded hover:bg-green-100">完成</button>
                        <button onclick="deleteTask({{ task.id }})" class="text-xs px-2 py-1 bg-gray-50 text-gray-400 rounded hover:bg-red-50 hover:text-red-500">删</button>
                    </div>
                </div>
                {% endfor %}
                {% if not today_tasks %}
                <div class="text-center text-gray-300 text-sm py-8">今天没有待办</div>
                {% endif %}
            </div>
        </div>

        <!-- 本周待办 -->
        <div class="mb-6">
            <h2 class="text-sm font-semibold text-blue-500 mb-2">本周完成即可</h2>
            <div id="week-list" class="space-y-1">
                {% for task in week_tasks %}
                <div class="bg-white rounded border px-4 py-3 flex items-center justify-between group hover:shadow-sm transition-shadow" id="task-{{ task.id }}">
                    <span class="text-sm text-gray-700">{{ task.content }}</span>
                    <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="doneTask({{ task.id }})" class="text-xs px-2 py-1 bg-green-50 text-green-600 rounded hover:bg-green-100">完成</button>
                        <button onclick="deleteTask({{ task.id }})" class="text-xs px-2 py-1 bg-gray-50 text-gray-400 rounded hover:bg-red-50 hover:text-red-500">删</button>
                    </div>
                </div>
                {% endfor %}
                {% if not week_tasks %}
                <div class="text-center text-gray-300 text-sm py-8">本周没有待办</div>
                {% endif %}
            </div>
        </div>

        <!-- 底部 -->
        <div class="text-center text-xs text-gray-400 mt-8">
            Agent: {{ agent_count }}个 |
            桌面通知 ON | 钉钉 ON
        </div>
    </div>

    <script>
    document.getElementById('add-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const content = document.getElementById('task-input').value.trim();
        const deadline = document.getElementById('task-deadline').value;
        if (!content) return;
        const form = new FormData();
        form.append('content', content);
        form.append('deadline', deadline);
        await fetch('/api/tasks/add', { method: 'POST', body: form });
        document.getElementById('task-input').value = '';
        location.reload();
    });

    async function doneTask(id) {
        await fetch('/api/tasks/' + id + '/done', { method: 'POST' });
        location.reload();
    }

    async function deleteTask(id) {
        await fetch('/api/tasks/' + id + '/delete', { method: 'POST' });
        location.reload();
    }
    </script>
</body>
</html>
